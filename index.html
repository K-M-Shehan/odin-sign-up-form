<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barto's Fanclub Registration</title>
  <link rel="stylesheet" href="styles.css">
  <script src="index.js" defer></script>
</head>
<body>

  <div class="container">
    <div class="cover-img-div">
      <img src="res/cover-img.jpg" alt="Gear 5 luffy pin on t-shirt" class="cover-img">
        <div class="logo">
          <img src="res/logo.png" alt="logo, arm with cross tatooed" class="logo-img">
          <div class="logo-txt">Barto's Fanclub</div>
        </div>
    </div>

    <div class="form-section">
      <h1>Join the brotherhood!</h1>
      <h1>Let's support our favorite Strawhats together!</h1>
      <br>
      <h2>Let's do this!</h2>
      <form action="https://httpbin.org/post" method="post">

        <div class="input-box">
           <article>
              <div class="form-container">
                 <div class="form-item">
                  <label for="first-name">FIRST NAME</label>
                  <input type="text" name="first-name" id="first-name">
                </div>
                <div class="form-item">
                  <label for="last-name">LAST NAME</label>
                  <input type="text" name="last-name" id="last-name">
                </div>
              </div>
          </article> 

          <article>
              <div class="form-container">
                <div class="form-item">
                  <label for="email-address">EMAIL ADDRESS</label>
                  <input type="email" name="email-address" id="email-address">
                </div>
                <div class="form-item">
                  <label for="phone-number">PHONE</label>
                  <input type="text" name="phone-number" id="phone-number">
                </div>
              </div>
          </article> 

          <article>
              <div class="form-container">
                <div class="form-item">
                  <label for="password">PASSWORD</label>
                  <input type="password" name="password" id="password">
                </div>
                <div class="form-item">
                  <label for="confirm-password">CONFIRM PASSWORD</label>
                  <input type="password" name="confirm-password" id="confirm-password">
                </div>
              </div>
          </article> 
        </div>

         

        <article>
          <button type="submit">Join</button>
        </article>
      </form>

      <p>Already have an account? Log in</p>
    </div>
  </div>
</body>
</html>
